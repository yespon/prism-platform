# OpsinTech Platform - Production Environment
# Usage: ./scripts/deploy.sh up
#
# Services:
#   - nginx:       Reverse proxy (port 2026, configurable via PORT env var)
#   - frontend:    Next.js production server
#   - gateway:     FastAPI Gateway API
#   - langgraph:   LangGraph production server
#   - db-init:     Database migration runner (alembic upgrade head)
#   - postgres:    (optional) PostgreSQL database, profile: postgres
#   - provisioner: (optional) Sandbox provisioner for Kubernetes mode
#
# Key environment variables (set via scripts/deploy.sh):
#   OPSINTECH_HOME                   — runtime data dir, default $REPO_ROOT/backend/.opsintech
#   OPSINTECH_CONFIG_PATH            — path to config.yaml
#   OPSINTECH_DOCKER_SOCKET          — Docker socket path, default /var/run/docker.sock
#   OPSINTECH_REPO_ROOT              — repo root (used for skills host path in DooD)
#
# Database modes:
#   - SQLite (default): no extra services needed, db-init creates the file
#   - PostgreSQL: run with --profile postgres, set config.yaml database.url accordingly
#
# Access: http://localhost:${PORT:-2026}

services:
  # ── Database Migration (runs before gateway/langgraph) ─────────────────────
  db-init:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: opsintech-db-init
    command: sh -c "cd backend && PYTHONPATH=. uv run alembic upgrade head"
    volumes:
      - ${OPSINTECH_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ${OPSINTECH_HOME}:/app/backend/.opsintech
    working_dir: /app
    environment:
      - CI=true
      - OPSINTECH_HOME=/app/backend/.opsintech
    networks:
      - opsintech
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── PostgreSQL (optional, profile: postgres) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opsintech-postgres
    profiles:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opsintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsintech}
      POSTGRES_DB: ${POSTGRES_DB:-opsintech}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    networks:
      - opsintech
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsintech} -d ${POSTGRES_DB:-opsintech}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: opsintech-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
      langgraph:
        condition: service_healthy
    networks:
      - opsintech
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Frontend: Next.js Production ───────────────────────────────────────────
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: opsintech-frontend
    volumes:
      - ${OPSINTECH_CONFIG_PATH}:/app/config.yaml:ro
      - ${OPSINTECH_HOME}:/app/backend/.opsintech
    environment:
      SERVER_BACKEND_URL: http://gateway:8001
    networks:
      - opsintech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Gateway API ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: opsintech-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - ${OPSINTECH_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ../skills:/app/skills:ro
      - ${OPSINTECH_HOME}:/app/backend/.opsintech
      - ${OPSINTECH_DOCKER_SOCKET}:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      - OPSINTECH_HOME=/app/backend/.opsintech
      - OPSINTECH_HOST_BASE_DIR=${OPSINTECH_HOME}
      - OPSINTECH_HOST_SKILLS_PATH=${OPSINTECH_REPO_ROOT}/skills
      - OPSINTECH_SANDBOX_HOST=host.docker.internal
      - CORS_ORIGINS=http://localhost:2026,http://frontend:3000
      - FRONTEND_URL=http://frontend:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - opsintech
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # ── LangGraph Server ───────────────────────────────────────────────────────
  # Uses `langgraph dev` (no license required) in production mode (--no-reload).
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: opsintech-langgraph
    command: sh -c "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
    volumes:
      - ${OPSINTECH_CONFIG_PATH}:/app/config.yaml:ro
      - ${OPSINTECH_HOME}:/app/backend/.opsintech
      - ../skills:/app/skills:ro
      - ../backend/.langgraph_api:/app/backend/.langgraph_api
      - ${OPSINTECH_DOCKER_SOCKET}:/var/run/docker.sock
    environment:
      - CI=true
      - OPSINTECH_HOME=/app/backend/.opsintech
      - OPSINTECH_CONFIG_PATH=/app/config.yaml
      - OPSINTECH_HOST_BASE_DIR=${OPSINTECH_HOME}
      - OPSINTECH_HOST_SKILLS_PATH=${OPSINTECH_REPO_ROOT}/skills
      - OPSINTECH_SANDBOX_HOST=host.docker.internal
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - CORS_ORIGINS=http://localhost:2026,http://frontend:3000
      - FRONTEND_URL=http://frontend:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - opsintech
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2024/ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Sandbox Provisioner (optional, Kubernetes mode) ────────────────────────
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: opsintech-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=opsintech
      - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      - SKILLS_HOST_PATH=${OPSINTECH_REPO_ROOT}/skills
      - THREADS_HOST_PATH=${OPSINTECH_HOME}/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      - K8S_API_SERVER=https://host.docker.internal:26443
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - opsintech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

networks:
  opsintech:
    driver: bridge

volumes:
  postgres-data:
