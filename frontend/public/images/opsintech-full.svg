<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <defs>
    <!-- Seamless Gradient Loop for the 4 facets -->
    <linearGradient id="grad-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="grad-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="grad-bottom" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="grad-left" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
    <linearGradient id="grad-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.15" />
    </filter>
    <filter id="core-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .logo-text {
      font-family: 'Space Grotesk', 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 210px;
      font-weight: 800;
      letter-spacing: -3px;
    }
    
    .text-ops { fill: #1E293B; } 
    .text-in { fill: #06B6D4; } 
    .text-tech { fill: #7C3AED; } 
    
    /* Support for rendering perfectly inside dark-mode containers like GitHub/Next.js root */
    @media (prefers-color-scheme: dark) {
      .text-ops { fill: #F8FAFC; }
    }
  </style>

  <!-- Transparent padding -->
  <rect width="1600" height="400" fill="transparent" />

  <!-- ==================== ICON PART ==================== -->
  <g transform="translate(20, 0)">
    <g transform="rotate(45 200 200)" filter="url(#shadow)">
      <rect x="100" y="100" width="140" height="48" rx="14" fill="url(#grad-top)" />
      <rect x="252" y="100" width="48" height="140" rx="14" fill="url(#grad-right)" />
      <rect x="160" y="252" width="140" height="48" rx="14" fill="url(#grad-bottom)" />
      <rect x="100" y="160" width="48" height="140" rx="14" fill="url(#grad-left)" />
      
      <!-- Core -->
      <rect x="172" y="172" width="56" height="56" rx="12" fill="url(#grad-core)" filter="url(#core-glow)" transform="rotate(-45 200 200)" />
    </g>
  </g>

  <!-- ==================== TEXT PART ==================== -->
  <g transform="translate(460, 275)">
    <text class="logo-text">
      <tspan class="text-ops">Ops</tspan><tspan class="text-in">In</tspan><tspan class="text-tech">Tech</tspan>
    </text>
  </g>
</svg>
