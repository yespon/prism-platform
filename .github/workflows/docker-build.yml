name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: opsintech-backend:ci
          cache-from: type=gha,scope=opsintech-backend
          cache-to: type=gha,mode=max,scope=opsintech-backend

      - name: Export image
        run: docker save opsintech-backend:ci | gzip > opsintech-backend.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsintech-backend
          path: opsintech-backend.tar.gz

  frontend:
    name: Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: prod
          push: false
          load: true
          tags: opsintech-frontend:ci
          cache-from: type=gha,scope=opsintech-frontend
          cache-to: type=gha,mode=max,scope=opsintech-frontend

      - name: Export image
        run: docker save opsintech-frontend:ci | gzip > opsintech-frontend.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsintech-frontend
          path: opsintech-frontend.tar.gz

  provisioner:
    name: Provisioner Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build provisioner
        uses: docker/build-push-action@v6
        with:
          context: docker/provisioner
          file: docker/provisioner/Dockerfile
          push: false
          load: true
          tags: opsintech-provisioner:ci
          cache-from: type=gha,scope=opsintech-provisioner
          cache-to: type=gha,mode=max,scope=opsintech-provisioner

      - name: Export image
        run: docker save opsintech-provisioner:ci | gzip > opsintech-provisioner.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsintech-provisioner
          path: opsintech-provisioner.tar.gz
